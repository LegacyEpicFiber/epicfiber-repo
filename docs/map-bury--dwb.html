<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BURY / DWB — Proximity Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e2e8f0; overflow: hidden; }
  #map { width: 100vw; height: 100vh; }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(15,17,23,0.88); backdrop-filter: blur(6px);
    border: 1px solid #334155; border-radius: 10px;
    padding: 8px 16px; z-index: 1000;
    display: flex; align-items: center; gap: 14px; font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  #hud .title { font-weight: 700; color: #cbd5e1; letter-spacing: 0.02em; }
  #hud .selected-info { color: #60a5fa; font-size: 12px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
  #reset-btn {
    background: #1e293b; border: 1px solid #475569; color: #94a3b8;
    padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  #reset-btn:hover { background: #334155; color: #e2e8f0; border-color: #64748b; }
  #reset-btn:active { background: #475569; }

  /* ── SEARCH ── */
  #search-wrap { position: relative; display: flex; align-items: center; }
  #search-input {
    background: #1e293b; border: 1px solid #334155; border-radius: 7px;
    color: #e2e8f0; font-size: 12px; padding: 5px 26px 5px 10px;
    outline: none; width: 210px; transition: border-color 0.15s, width 0.2s;
  }
  #search-input:focus { border-color: #2563eb; width: 270px; }
  #search-input::placeholder { color: #475569; }
  #search-clear {
    position: absolute; right: 6px; background: none; border: none;
    color: #475569; cursor: pointer; font-size: 12px; padding: 2px; display: none;
  }
  #search-clear:hover { color: #94a3b8; }
  #search-results {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    list-style: none; min-width: 270px; max-height: 230px; overflow-y: auto;
    z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.55); display: none;
  }
  #search-results li { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #0f1117; }
  #search-results li:last-child { border-bottom: none; }
  #search-results li:hover, #search-results li.sr-active { background: #273447; }
  #search-results .sr-addr { color: #f1f5f9; font-weight: 600; font-size: 12px; }
  #search-results .sr-city { color: #64748b; font-size: 11px; }
  #search-results .sr-none { color: #475569; text-align: center; padding: 12px; cursor: default; font-size: 12px; }

  /* ── LEGEND ── */
  #legend {
    position: fixed; bottom: 24px; left: 16px;
    background: rgba(15,17,23,0.88); backdrop-filter: blur(6px);
    border: 1px solid #334155; border-radius: 10px;
    padding: 12px 16px; z-index: 1000; font-size: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    min-width: 176px;
  }
  #legend .legend-title { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; color: #94a3b8; }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.25); }

  /* ── MODE TOGGLE ── */
  .mode-btns, .dist-btns { display: flex; gap: 5px; margin: 6px 0 4px; }
  .mode-btn, .dist-btn {
    flex: 1; background: #1e293b; border: 1px solid #334155;
    color: #94a3b8; border-radius: 5px; padding: 5px 6px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; text-align: center; white-space: nowrap;
  }
  .mode-btn:hover, .dist-btn:hover { background: #334155; color: #e2e8f0; }
  .mode-btn.active { background: #1d4ed8; border-color: #2563eb; color: #fff; }
  .dist-btn.active { background: #0f766e; border-color: #0d9488; color: #fff; }
  #dist-presets { margin-top: 8px; }

  /* ── INSTRUCTIONS ── */
  #instructions {
    position: fixed; bottom: 24px; right: 16px;
    background: rgba(15,17,23,0.88); backdrop-filter: blur(6px);
    border: 1px solid #334155; border-radius: 10px;
    padding: 10px 14px; z-index: 1000; font-size: 11px; color: #475569;
    line-height: 1.6;
  }

  /* ── DISTANCE PANEL ── */
  #dist-panel {
    position: fixed; top: 12px; right: 16px;
    background: rgba(15,17,23,0.88); backdrop-filter: blur(6px);
    border: 1px solid #334155; border-radius: 10px;
    padding: 11px 14px; z-index: 1000; font-size: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    min-width: 200px;
  }
  #dist-panel .dp-title { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .dp-label { color: #475569; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; margin-top: 7px; }
  .dp-label:first-of-type { margin-top: 0; }
  .dp-sw { position: relative; }
  .dp-sw input {
    background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    color: #e2e8f0; font-size: 11px; padding: 5px 22px 5px 8px;
    outline: none; width: 100%; transition: border-color 0.15s;
  }
  .dp-sw input:focus { border-color: #2563eb; }
  .dp-sw input::placeholder { color: #475569; }
  .dp-sw-clear {
    position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #475569; cursor: pointer;
    font-size: 11px; padding: 1px; display: none;
  }
  .dp-sw-clear:hover { color: #94a3b8; }
  .dp-sw-results {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #1e293b; border: 1px solid #334155; border-radius: 7px;
    list-style: none; max-height: 170px; overflow-y: auto;
    z-index: 2001; box-shadow: 0 6px 18px rgba(0,0,0,0.5); display: none;
  }
  .dp-sw-results li { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #0f1117; font-size: 11px; }
  .dp-sw-results li:last-child { border-bottom: none; }
  .dp-sw-results li:hover, .dp-sw-results li.dp-active { background: #273447; }
  .dp-sw-results .dp-ra { color: #f1f5f9; font-weight: 600; }
  .dp-sw-results .dp-rc { color: #64748b; font-size: 10px; }
  .dp-sw-results .dp-rn { color: #475569; text-align: center; padding: 10px; cursor: default; }
  #dist-result {
    margin-top: 10px; padding: 8px 10px;
    background: #0f1117; border-radius: 7px; border: 1px solid #1e293b;
    text-align: center; display: none;
  }
  #dist-result .dr-mi { color: #f59e0b; font-size: 17px; font-weight: 700; }
  #dist-result .dr-km { color: #475569; font-size: 11px; margin-top: 2px; }

  /* ── HOVER TOOLTIP ── */
  .leaflet-tooltip.addr-tip {
    background: #1e293b;
    border: 1px solid #475569;
    border-radius: 7px;
    color: #e2e8f0;
    font-size: 12px;
    line-height: 1.5;
    padding: 7px 11px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    white-space: nowrap;
    pointer-events: none;
  }
  .leaflet-tooltip.addr-tip::before { display: none; }

  /* ── POPUPS ── */
  .leaflet-popup-content-wrapper {
    background: #1e293b !important;
    border: 1px solid #334155 !important;
    border-radius: 10px !important;
    color: #e2e8f0 !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    padding: 14px 16px !important;
    min-width: 200px;
  }
  .leaflet-popup-tip { background: #1e293b !important; }
  .leaflet-popup-close-button { color: #64748b !important; font-size: 16px !important; top: 8px !important; right: 10px !important; }
  .leaflet-popup-close-button:hover { color: #e2e8f0 !important; }
  .popup-address { font-weight: 700; font-size: 14px; color: #f1f5f9; margin-bottom: 2px; }
  .popup-row { color: #475569; font-size: 11px; margin-bottom: 4px; letter-spacing: 0.03em; }
  .popup-city { color: #64748b; font-size: 12px; margin-bottom: 3px; }
  .popup-meta { color: #475569; font-size: 11px; margin-bottom: 10px; }
  .popup-dist { color: #60a5fa; font-size: 11px; margin-bottom: 10px; font-style: italic; }
  .popup-link {
    display: inline-block; background: #2563eb; color: #fff !important;
    text-decoration: none; padding: 5px 12px; border-radius: 5px; font-size: 12px;
    font-weight: 500; transition: background 0.15s;
  }
  .popup-link:hover { background: #1d4ed8 !important; }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0; background: #0f1117;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 12px;
  }
  #loading .spinner {
    width: 36px; height: 36px; border: 3px solid #334155;
    border-top-color: #3b82f6; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading .loading-text { color: #64748b; font-size: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading map…</div>
</div>

<!-- HUD -->
<div id="hud">
  <span class="title">BURY / DWB</span>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="🔍  Search address or city…" autocomplete="off" spellcheck="false">
    <button id="search-clear" title="Clear">✕</button>
    <ul id="search-results"></ul>
  </div>
  <span class="selected-info" id="selected-label"></span>
  <button id="reset-btn" onclick="resetAll()" style="display:none">✕ Reset</button>
</div>

<!-- Legend -->
<div id="legend">
  <div class="legend-title">Proximity Mode</div>
  <div class="mode-btns">
    <button id="mode-count" class="mode-btn active" onclick="setMode('count')">By Count</button>
    <button id="mode-dist"  class="mode-btn"        onclick="setMode('distance')">By Distance</button>
  </div>

  <div id="dist-presets" style="display:none">
    <div class="legend-title">Radius</div>
    <div class="dist-btns">
      <button class="dist-btn active" onclick="setRadius(10,  this)">10 mi</button>
      <button class="dist-btn"        onclick="setRadius(25,  this)">25 mi</button>
      <button class="dist-btn"        onclick="setRadius(50,  this)">50 mi</button>
    </div>
  </div>

  <div class="legend-title" style="margin-top:10px">Color Key</div>
  <div class="legend-row"><div class="dot" style="background:#3b82f6"></div> Selected node</div>
  <div class="legend-row"><div class="dot" style="background:#22c55e"></div> <span id="leg-close">5 closest</span></div>
  <div class="legend-row"><div class="dot" style="background:#eab308"></div> <span id="leg-medium">Next 10 (6–15)</span></div>
  <div class="legend-row"><div class="dot" style="background:#ef4444"></div> <span id="leg-far">Farther (16+)</span></div>
  <div class="legend-row"><div class="dot" style="background:#9ca3af"></div> Unselected</div>
</div>

<!-- Instructions -->
<div id="instructions">
  <div id="count-label" style="color:#64748b; font-size:11px; margin-bottom:7px; font-weight:600;"></div>
  <strong style="color:#64748b">Hover</strong> → address + nearest 5 lines<br>
  <strong style="color:#64748b">Click</strong> any dot → proximity view<br>
  <strong style="color:#64748b">Click again</strong> → deselect
</div>

<!-- Distance Panel -->
<div id="dist-panel">
  <div class="dp-title">📏 Distance</div>
  <div class="dp-label">From</div>
  <div class="dp-sw">
    <input id="dp-input-a" type="text" placeholder="Search address or city…" autocomplete="off" spellcheck="false">
    <button class="dp-sw-clear" id="dp-clear-a">✕</button>
    <ul class="dp-sw-results" id="dp-results-a"></ul>
  </div>
  <div class="dp-label">To</div>
  <div class="dp-sw">
    <input id="dp-input-b" type="text" placeholder="Search address or city…" autocomplete="off" spellcheck="false">
    <button class="dp-sw-clear" id="dp-clear-b">✕</button>
    <ul class="dp-sw-results" id="dp-results-b"></ul>
  </div>
  <div id="dist-result">
    <div class="dr-mi" id="dr-mi"></div>
    <div class="dr-km" id="dr-km"></div>
  </div>
</div>

<!-- Map -->
<div id="map"></div>

  selected: '#3b82f6',
  close:    '#22c55e',
  medium:   '#eab308',
  far:      '#ef4444',
};

// ════════════════════════════════════════════════════════════════════════════
//  HAVERSINE  (great-circle distance in km)
// ════════════════════════════════════════════════════════════════════════════
function haversine(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const chord =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(a.lat * Math.PI / 180) *
    Math.cos(b.lat * Math.PI / 180) *
    Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(chord), Math.sqrt(1 - chord));
}

// ════════════════════════════════════════════════════════════════════════════
//  MARKERS
// ════════════════════════════════════════════════════════════════════════════
function markerOpts(color, big) {
  return {
    radius: big ? 9 : 7,
    fillColor: color,
    color: '#ffffff',
    weight: big ? 2.5 : 1.5,
    opacity: 1,
    fillOpacity: 0.92,
  };
}

const markers = ADDRESSES.map((a, i) => {
  const m = L.circleMarker([a.lat, a.lng], markerOpts(C.default, false));
  m.bindPopup(() => buildPopup(i), { maxWidth: 260, autoPan: true });
  m.bindTooltip(
    () => `<strong>${a.address}</strong><br><span style="color:#94a3b8">${a.city}${a.state ? ', ' + a.state : ''}</span>`,
    { sticky: true, direction: 'top', offset: [0, -8], className: 'addr-tip', opacity: 0.97 }
  );
  m.on('click', (e) => { L.DomEvent.stopPropagation(e); selectNode(i); });
  m.on('mouseover', () => { if (selectedIdx === null) showHoverLines(i); });
  m.on('mouseout',  () => { if (selectedIdx === null) clearHoverLines(); });
  m.addTo(map);
  return m;
});

function buildPopup(i) {
  const a = ADDRESSES[i];
  let distHtml = '';
  if (selectedIdx !== null && selectedIdx !== i) {
    const km = haversine(ADDRESSES[selectedIdx], a);
    const mi = (km * 0.621371).toFixed(1);
    distHtml = `<div class="popup-dist">${mi} mi from selected</div>`;
  }
  const meta = [a.county, a.township].filter(Boolean).join(' · ');
  const metaHtml = meta ? `<div class="popup-meta">${meta}</div>` : '';
  const rowHtml = a.row_num ? `<div class="popup-row">Row ${a.row_num}</div>` : '';
  return `
    <div class="popup-address">${a.address}</div>
    ${rowHtml}
    <div class="popup-city">${a.city}${a.state ? ', ' + a.state : ''}</div>
    ${metaHtml}
    ${distHtml}
    <a class="popup-link" href="${a.maps_url}" target="_blank">Open in Google Maps ↗</a>
  `;
}

// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
let selectedIdx    = null;
let hoverLines     = [];
let clickLines     = [];
let proximityMode  = 'count';   // 'count' | 'distance'
let distRadius     = 10;        // miles (distance mode only)

// ════════════════════════════════════════════════════════════════════════════
//  SELECTION  &  PROXIMITY COLORING
// ════════════════════════════════════════════════════════════════════════════
function selectNode(i) {
  if (selectedIdx === i) { resetAll(); return; }
  selectedIdx = i;
  clearHoverLines();
  clearClickLines();
  applyProximityColors(i);
  drawClickLines(i);
  markers[i].setStyle(markerOpts(C.selected, true));
  markers[i].openPopup();
  const addr = ADDRESSES[i].address;
  document.getElementById('selected-label').textContent = `📍 ${addr}`;
  document.getElementById('reset-btn').style.display = 'inline-block';
}

function applyProximityColors(centerIdx) {
  const center = ADDRESSES[centerIdx];
  if (proximityMode === 'count') {
    const ranked = ADDRESSES
      .map((a, i) => ({ i, dist: haversine(center, a) }))
      .sort((a, b) => a.dist - b.dist);
    ranked.forEach(({ i }, rank) => {
      if (i === centerIdx) return;
      let color;
      if (rank <= 5)       color = C.close;
      else if (rank <= 15) color = C.medium;
      else                 color = C.far;
      markers[i].setStyle(markerOpts(color, false));
    });
  } else {
    const closeKm  = distRadius * 1.60934;
    const mediumKm = closeKm * 2;
    ADDRESSES.forEach((a, i) => {
      if (i === centerIdx) return;
      const km = haversine(center, a);
      let color;
      if      (km <= closeKm)  color = C.close;
      else if (km <= mediumKm) color = C.medium;
      else                     color = C.far;
      markers[i].setStyle(markerOpts(color, false));
    });
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  MODE / DISTANCE CONTROLS
// ════════════════════════════════════════════════════════════════════════════
function setMode(mode) {
  proximityMode = mode;
  document.getElementById('mode-count').classList.toggle('active', mode === 'count');
  document.getElementById('mode-dist').classList.toggle('active',  mode === 'distance');
  document.getElementById('dist-presets').style.display = mode === 'distance' ? 'block' : 'none';
  _updateLegendLabels();
  if (selectedIdx !== null) applyProximityColors(selectedIdx);
}

function setRadius(miles, btn) {
  distRadius = miles;
  document.querySelectorAll('.dist-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _updateLegendLabels();
  if (selectedIdx !== null) applyProximityColors(selectedIdx);
}

function _updateLegendLabels() {
  if (proximityMode === 'count') {
    document.getElementById('leg-close').textContent  = '5 closest';
    document.getElementById('leg-medium').textContent = 'Next 10 (6–15)';
    document.getElementById('leg-far').textContent    = 'Farther (16+)';
  } else {
    const r = distRadius;
    document.getElementById('leg-close').textContent  = `Within ${r} mi`;
    document.getElementById('leg-medium').textContent = `${r}–${r * 2} mi`;
    document.getElementById('leg-far').textContent    = `Beyond ${r * 2} mi`;
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  LINES
// ════════════════════════════════════════════════════════════════════════════
function nearestN(centerIdx, n) {
  const center = ADDRESSES[centerIdx];
  return ADDRESSES
    .map((a, i) => ({ i, dist: haversine(center, a) }))
    .filter(x => x.i !== centerIdx)
    .sort((a, b) => a.dist - b.dist)
    .slice(0, n);
}

function drawLine(from, to, opacity, dashed) {
  return L.polyline(
    [[from.lat, from.lng], [to.lat, to.lng]],
    { color: '#60a5fa', weight: 1.5, opacity, dashArray: dashed ? '6 5' : null }
  ).addTo(map);
}

function showHoverLines(idx) {
  clearHoverLines();
  const center = ADDRESSES[idx];
  nearestN(idx, 5).forEach(({ i, dist }) => {
    const op = Math.max(0.15, 1 - dist / 60);
    hoverLines.push(drawLine(center, ADDRESSES[i], op, true));
  });
}
function clearHoverLines() { hoverLines.forEach(l => map.removeLayer(l)); hoverLines = []; }

function drawClickLines(idx) {
  clearClickLines();
  const center = ADDRESSES[idx];
  nearestN(idx, 15).forEach(({ i, dist }) => {
    const op = Math.max(0.2, 1 - dist / 100);
    clickLines.push(drawLine(center, ADDRESSES[i], op, false));
  });
}
function clearClickLines() { clickLines.forEach(l => map.removeLayer(l)); clickLines = []; }

// ════════════════════════════════════════════════════════════════════════════
//  RESET
// ════════════════════════════════════════════════════════════════════════════
function resetAll() {
  selectedIdx = null;
  clearHoverLines();
  clearClickLines();
  markers.forEach(m => m.setStyle(markerOpts(C.default, false)));
  map.closePopup();
  document.getElementById('selected-label').textContent = '';
  document.getElementById('reset-btn').style.display = 'none';
}

map.on('click', resetAll);

// ════════════════════════════════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════════════════════════════════
const searchInput   = document.getElementById('search-input');
const searchClear   = document.getElementById('search-clear');
const searchResults = document.getElementById('search-results');
let searchActiveIdx = -1;

function doSearch(q) {
  q = q.trim().toLowerCase();
  searchClear.style.display = q ? 'block' : 'none';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = ADDRESSES
    .map((a, i) => ({ a, i }))
    .filter(({ a }) =>
      a.address.toLowerCase().includes(q) ||
      a.city.toLowerCase().includes(q)
    )
    .slice(0, 8);
  searchResults.innerHTML = '';
  if (!matches.length) {
    searchResults.innerHTML = '<li class="sr-none">No results</li>';
  } else {
    matches.forEach(({ a, i }) => {
      const li = document.createElement('li');
      li.dataset.idx = i;
      li.innerHTML = `<div class="sr-addr">${a.address}</div><div class="sr-city">${a.city}${a.state ? ', ' + a.state : ''}</div>`;
      li.addEventListener('mousedown', e => { e.preventDefault(); pickResult(i); });
      searchResults.appendChild(li);
    });
  }
  searchActiveIdx = -1;
  searchResults.style.display = 'block';
}

function pickResult(i) {
  searchInput.value = '';
  searchClear.style.display = 'none';
  searchResults.style.display = 'none';
  map.flyTo([ADDRESSES[i].lat, ADDRESSES[i].lng], Math.max(map.getZoom(), 13), { duration: 0.6 });
  selectNode(i);
}

searchInput.addEventListener('input',  e => doSearch(e.target.value));
searchInput.addEventListener('focus',  () => { if (searchInput.value.trim()) doSearch(searchInput.value); });
searchInput.addEventListener('blur',   () => setTimeout(() => { searchResults.style.display = 'none'; }, 150));
searchClear.addEventListener('click',  () => { searchInput.value = ''; searchClear.style.display = 'none'; searchResults.style.display = 'none'; searchInput.focus(); });

searchInput.addEventListener('keydown', e => {
  const items = Array.from(searchResults.querySelectorAll('li[data-idx]'));
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchActiveIdx = Math.min(searchActiveIdx + 1, items.length - 1);
    items.forEach((li, n) => li.classList.toggle('sr-active', n === searchActiveIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchActiveIdx = Math.max(searchActiveIdx - 1, 0);
    items.forEach((li, n) => li.classList.toggle('sr-active', n === searchActiveIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (searchActiveIdx >= 0 && items[searchActiveIdx]) {
      pickResult(parseInt(items[searchActiveIdx].dataset.idx));
    } else if (items.length === 1) {
      pickResult(parseInt(items[0].dataset.idx));
    }
  } else if (e.key === 'Escape') {
    searchInput.value = '';
    searchClear.style.display = 'none';
    searchResults.style.display = 'none';
    searchInput.blur();
  }
});

// ════════════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════════════
document.getElementById('count-label').textContent = `${ADDRESSES.length} addresses`;

if (ADDRESSES.length > 0) {
  const bounds = L.latLngBounds(ADDRESSES.map(a => [a.lat, a.lng]));
  map.fitBounds(bounds.pad(0.08));
} else {
  map.setView([41.5, -86.0], 9);
  document.getElementById('loading').innerHTML =
    '<div style="color:#ef4444;font-size:14px">No geocoded addresses found.</div>';
}

map.once('load', () => document.getElementById('loading').style.display = 'none');
setTimeout(() => document.getElementById('loading').style.display = 'none', 2500);

// ════════════════════════════════════════════════════════════════════════════
//  DISTANCE PANEL
// ════════════════════════════════════════════════════════════════════════════
let dpIdxA = null, dpIdxB = null, dpLine = null;

function makeDpSearchBox(inputEl, clearEl, resultsEl, onSelect) {
  let active = -1;
  function search(q) {
    q = q.trim().toLowerCase();
    clearEl.style.display = q ? 'block' : 'none';
    if (!q) { resultsEl.style.display = 'none'; return; }
    const matches = ADDRESSES.map((a, i) => ({ a, i }))
      .filter(({ a }) => a.address.toLowerCase().includes(q) || a.city.toLowerCase().includes(q))
      .slice(0, 6);
    resultsEl.innerHTML = '';
    if (!matches.length) {
      resultsEl.innerHTML = '<li class="dp-rn">No results</li>';
    } else {
      matches.forEach(({ a, i }) => {
        const li = document.createElement('li');
        li.dataset.idx = i;
        li.innerHTML = `<div class="dp-ra">${a.address}</div><div class="dp-rc">${a.city}${a.state ? ', ' + a.state : ''}</div>`;
        li.addEventListener('mousedown', e => { e.preventDefault(); pick(i); });
        resultsEl.appendChild(li);
      });
    }
    active = -1;
    resultsEl.style.display = 'block';
  }
  function pick(i) {
    inputEl.value = ADDRESSES[i].address;
    clearEl.style.display = 'block';
    resultsEl.style.display = 'none';
    onSelect(i);
  }
  inputEl.addEventListener('input',  e => search(e.target.value));
  inputEl.addEventListener('focus',  () => { if (inputEl.value.trim()) search(inputEl.value); });
  inputEl.addEventListener('blur',   () => setTimeout(() => { resultsEl.style.display = 'none'; }, 150));
  clearEl.addEventListener('click',  () => { inputEl.value = ''; clearEl.style.display = 'none'; resultsEl.style.display = 'none'; onSelect(null); inputEl.focus(); });
  inputEl.addEventListener('keydown', e => {
    const items = Array.from(resultsEl.querySelectorAll('li[data-idx]'));
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      active = Math.min(active + 1, items.length - 1);
      items.forEach((li, n) => li.classList.toggle('dp-active', n === active));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      active = Math.max(active - 1, 0);
      items.forEach((li, n) => li.classList.toggle('dp-active', n === active));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (active >= 0 && items[active]) pick(parseInt(items[active].dataset.idx));
      else if (items.length === 1) pick(parseInt(items[0].dataset.idx));
    } else if (e.key === 'Escape') {
      inputEl.value = ''; clearEl.style.display = 'none';
      resultsEl.style.display = 'none'; onSelect(null); inputEl.blur();
    }
  });
}

function updateDistLine() {
  if (dpLine) { map.removeLayer(dpLine); dpLine = null; }
  const resultEl = document.getElementById('dist-result');
  if (dpIdxA !== null && dpIdxB !== null) {
    const km = haversine(ADDRESSES[dpIdxA], ADDRESSES[dpIdxB]);
    const mi = (km * 0.621371).toFixed(2);
    document.getElementById('dr-mi').textContent = `${mi} mi`;
    document.getElementById('dr-km').textContent = `${km.toFixed(2)} km`;
    resultEl.style.display = 'block';
    dpLine = L.polyline(
      [[ADDRESSES[dpIdxA].lat, ADDRESSES[dpIdxA].lng],
       [ADDRESSES[dpIdxB].lat, ADDRESSES[dpIdxB].lng]],
      { color: '#f59e0b', weight: 2.5, opacity: 0.9, dashArray: '8 5' }
    ).addTo(map);
  } else {
    resultEl.style.display = 'none';
  }
}

makeDpSearchBox(
  document.getElementById('dp-input-a'),
  document.getElementById('dp-clear-a'),
  document.getElementById('dp-results-a'),
  i => { dpIdxA = i; updateDistLine(); }
);
makeDpSearchBox(
  document.getElementById('dp-input-b'),
  document.getElementById('dp-clear-b'),
  document.getElementById('dp-results-b'),
  i => { dpIdxB = i; updateDistLine(); }
);

// ════════════════════════════════════════════════════════════════════════════
//  BROWSER ZOOM GUARD
//  On Mac trackpads, Chrome/Brave represents pinch gestures as wheel events
//  with ctrlKey=true. Without intervention, this scales the ENTIRE PAGE and
//  pushes the fixed-position legend panels off screen.
//  Fix: preventDefault on those events so the browser never page-zooms.
//  Leaflet still receives the same wheel event and zooms the MAP correctly.
//  Also remaps Cmd/Ctrl +/- keyboard shortcuts to map zoom instead of page zoom.
// ════════════════════════════════════════════════════════════════════════════
window.addEventListener('wheel', e => {
  if (e.ctrlKey) e.preventDefault();   // block page zoom; Leaflet still handles map zoom
}, { passive: false });

document.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  const k = e.key;
  if (k === '+' || k === '=' || k === 'Add') {
    e.preventDefault(); map.zoomIn();
  } else if (k === '-' || k === 'Subtract') {
    e.preventDefault(); map.zoomOut();
  } else if (k === '0') {
    // Cmd+0: reset view to fit all addresses instead of resetting browser zoom
    e.preventDefault();
    if (ADDRESSES.length > 0)
      map.fitBounds(L.latLngBounds(ADDRESSES.map(a => [a.lat, a.lng])).pad(0.08));
  }
});
</script>
</body>
